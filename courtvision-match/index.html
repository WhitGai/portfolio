<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>CourtVision — Match Mode</title>
<style>
  :root{
    --ink:#0f1722;--mut:#6b7a8d;--line:#e5e9f0;--bg:#0b2b29;--card:#fff;
    --teal:#1f6f6b;--teal2:#0d4d49;--mint:#02c39a;--accent:#15803d;
    --serveA:#1f6f6b;--serveB:#b45309;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box} html,body{margin:0;background:var(--bg);color:#eaf6f4;-webkit-font-smoothing:antialiased}
  .wrap{max-width:560px;margin:0 auto;padding:18px 16px 40px}
  header{display:flex;align-items:center;gap:10px;margin-bottom:14px}
  header .dot{width:24px;height:24px;border-radius:7px;background:linear-gradient(135deg,var(--mint),var(--teal));}
  header h1{font-size:18px;margin:0;font-weight:650;letter-spacing:.2px}
  header small{display:block;color:#8fb5b1;font-weight:500;font-size:11px;margin-top:-2px}
  .setup{display:flex;flex-wrap:wrap;gap:8px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:10px;margin-bottom:14px}
  .setup label{font-size:11px;color:#9fc6c1;display:block;margin-bottom:3px}
  .setup input,.setup select{font:inherit;font-size:13px;padding:6px 8px;border-radius:8px;border:1px solid rgba(255,255,255,.15);background:#0e3a37;color:#eaf6f4;width:100%}
  .setup .f{flex:1;min-width:90px}
  .board{background:var(--card);color:var(--ink);border-radius:18px;padding:20px;text-align:center;box-shadow:0 10px 30px rgba(0,0,0,.25)}
  .call{font-family:"Consolas",monospace;font-size:64px;font-weight:800;letter-spacing:2px;line-height:1;color:var(--teal2)}
  .call.over{font-size:30px;color:var(--accent)}
  .serveline{margin-top:8px;font-size:14px;color:var(--mut)}
  .teams{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}
  .team{border:2px solid var(--line);border-radius:14px;padding:12px}
  .team.serving{border-color:var(--teal);background:#e4f1f0}
  .team .nm{font-size:13px;color:var(--mut);font-weight:600}
  .team .sc{font-size:40px;font-weight:800;color:var(--ink)}
  .team .badge{font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:var(--teal2);font-weight:700;height:14px}
  .btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}
  .btn{font:inherit;font-size:15px;font-weight:650;padding:16px 10px;border-radius:14px;border:none;cursor:pointer;color:#fff}
  .btn.a{background:var(--serveA)} .btn.b{background:var(--serveB)}
  .btn:active{transform:scale(.98)}
  .ctl{display:flex;gap:10px;margin-top:12px;justify-content:center}
  .ctl button{font:inherit;font-size:13px;font-weight:600;padding:8px 16px;border-radius:10px;border:1px solid rgba(255,255,255,.2);background:transparent;color:#cfe6e3;cursor:pointer}
  .hint{margin-top:14px;font-size:12px;color:#8fb5b1;text-align:center;line-height:1.5}
  .win{margin-top:14px;background:#e7f6ec;color:#15803d;border-radius:12px;padding:12px;font-weight:650;text-align:center;display:none}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <span class="dot"></span>
    <h1>CourtVision<small>Match Mode · live scorekeeper</small></h1>
    <a href="../index.html" style="margin-left:auto;font-size:12px;color:#8fb5b1;text-decoration:none">‹ Portfolio</a>
  </header>

  <div class="setup">
    <div class="f"><label>Team A</label><input id="ta" value="Reds"/></div>
    <div class="f"><label>Team B</label><input id="tb" value="Blues"/></div>
    <div class="f"><label>Format</label><select id="fmt"><option value="doubles">Doubles</option><option value="singles">Singles</option></select></div>
    <div class="f"><label>Scoring</label><select id="scr"><option value="sideout">Side-out</option><option value="rally">Rally</option></select></div>
    <div class="f" style="max-width:80px"><label>To</label><input id="tgt" type="number" value="11" min="1" max="99"/></div>
    <div class="f" style="display:flex;align-items:flex-end"><button id="newgame" class="btn a" style="padding:8px 12px;font-size:13px;width:100%">New game</button></div>
  </div>

  <div class="board">
    <div id="call" class="call">0 0 2</div>
    <div id="serveline" class="serveline"></div>
    <div class="teams">
      <div id="teamA" class="team"><div class="badge" id="badgeA"></div><div class="nm" id="nameA">Reds</div><div class="sc" id="scoreA">0</div></div>
      <div id="teamB" class="team"><div class="badge" id="badgeB"></div><div class="nm" id="nameB">Blues</div><div class="sc" id="scoreB">0</div></div>
    </div>
    <div class="btns">
      <button class="btn a" id="wonA">Reds won rally</button>
      <button class="btn b" id="wonB">Blues won rally</button>
    </div>
    <div id="win" class="win"></div>
    <div class="ctl"><button id="undo">↶ Undo</button></div>
  </div>

  <p class="hint">Tap whichever team won the rally — the engine applies side-out logic, server rotation, the one-server rule, and win-by-two. Same tested rules engine as the CourtVision Rules MCP server.</p>
</div>

<script src="engine.js"></script>
<script>
let m;
const $ = id => document.getElementById(id);
function newGame(){
  m = new CourtVision.Match({
    teamA: $('ta').value || 'Team A', teamB: $('tb').value || 'Team B',
    target: parseInt($('tgt').value)||11, format: $('fmt').value, scoring: $('scr').value,
  });
  render();
}
function render(){
  const s = m.state;
  $('call').textContent = m.call();
  $('call').className = 'call' + (s.finished ? ' over' : '');
  $('nameA').textContent = s.teamA; $('nameB').textContent = s.teamB;
  $('scoreA').textContent = s.a; $('scoreB').textContent = s.b;
  $('wonA').textContent = s.teamA + ' won rally'; $('wonB').textContent = s.teamB + ' won rally';
  $('teamA').className = 'team' + (s.serving==='A' && !s.finished ? ' serving' : '');
  $('teamB').className = 'team' + (s.serving==='B' && !s.finished ? ' serving' : '');
  $('badgeA').textContent = (s.serving==='A' && !s.finished) ? 'serving' : '';
  $('badgeB').textContent = (s.serving==='B' && !s.finished) ? 'serving' : '';
  let sl = '';
  if(!s.finished){
    sl = 'Serving: ' + m.servingName();
    if(m.usesServerNumber()) sl += ' · server ' + s.server + (s.firstTurn ? ' (first turn)' : '');
    if(s.format==='singles') sl += ' · ' + (m.servingScore()%2===0 ? 'right' : 'left') + ' court';
  }
  $('serveline').textContent = sl;
  const won = s.finished;
  $('win').style.display = won ? 'block' : 'none';
  if(won) $('win').textContent = '🏆 ' + s.winner + ' win, ' + Math.max(s.a,s.b) + '–' + Math.min(s.a,s.b);
  $('wonA').disabled = won; $('wonB').disabled = won;
}
function rallyWonBy(team){
  if(m.state.finished) return;
  try { m.rally(team === m.state.serving ? 'server_won' : 'server_lost'); } catch(e){}
  render();
}
$('wonA').onclick = () => rallyWonBy('A');
$('wonB').onclick = () => rallyWonBy('B');
$('undo').onclick = () => { try{ m.undo(); render(); }catch(e){} };
$('newgame').onclick = newGame;
['fmt','scr','tgt','ta','tb'].forEach(id => $(id).addEventListener('change', newGame));
newGame();
</script>
</body>
</html>
