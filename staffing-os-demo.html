<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Staffing OS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#04243b; --panel:rgba(255,255,255,.055); --ink:#e9f6ff; --t2:#a8c8da; --t3:#6e93a8; --t4:#50708a;
  --line:rgba(160,220,255,.13); --line2:rgba(160,220,255,.24);
  --brand:#34e3d2; --brand-soft:rgba(52,227,210,.15); --brand-dk:#19c2b4;
  --ind:#5cc8ff; --blue:#5cc8ff; --green:#34e3d2; --green-bg:rgba(52,227,210,.15); --amber:#ffcf6b; --amber-bg:rgba(255,207,107,.14); --red:#ff7d8c; --red-bg:rgba(255,125,140,.14);
  --rail:#031b2e; --rail2:#0a2238;
  --sans:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  --mono:"JetBrains Mono",ui-monospace,Menlo,monospace;
  --sh:0 24px 56px -28px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.08);
}
*{box-sizing:border-box}
body{margin:0;background:var(--rail);color:var(--ink);font-family:var(--sans);font-size:14px;-webkit-font-smoothing:antialiased}
.app{display:flex;height:100vh;min-height:600px;overflow:hidden}
.mono{font-family:var(--mono)}
::selection{background:var(--brand);color:#fff}

/* sidebar */
.side{width:236px;background:var(--rail);flex:0 0 auto;display:flex;flex-direction:column;padding:16px 12px;border-right:1px solid #000}
.logo{display:flex;align-items:center;gap:10px;padding:6px 8px 18px}
.logo .wm{font-weight:800;font-size:22px;letter-spacing:-.04em;color:#fff}
.logo .wm .g{color:var(--brand)}
.logo .env{font-family:var(--mono);font-size:9px;color:#6b7080;margin-top:1px}
.navg{font-family:var(--mono);font-size:9.5px;text-transform:uppercase;letter-spacing:.12em;color:#5a5f70;padding:14px 10px 6px}
.nav{display:flex;align-items:center;gap:11px;padding:9px 10px;border-radius:9px;color:#aeb3c4;font-size:13.5px;font-weight:500;cursor:pointer;border:0;background:none;width:100%;text-align:left;font-family:var(--sans);position:relative}
.nav .i{width:17px;height:17px;flex:0 0 auto;opacity:.9}
.nav:hover{background:#1c1d2b;color:#fff}
.nav.on{background:#23131f;color:#fff}
.nav.on::before{content:"";position:absolute;left:-12px;top:8px;bottom:8px;width:3px;border-radius:3px;background:var(--brand)}
.nav.on .i{color:var(--brand)}
.nav .ct{margin-left:auto;font-family:var(--mono);font-size:10px;background:#23242f;color:#aeb3c4;border-radius:6px;padding:1px 7px}
.side .sp{flex:1}
.side .foot{border-top:1px solid #23242f;padding-top:10px}
.side .foot a{color:#6b7080;font-family:var(--mono);font-size:11px;text-decoration:none;display:block;padding:6px 10px}
.side .foot a:hover{color:#fff}

/* main */
.main{flex:1;min-width:0;display:flex;flex-direction:column;background:var(--bg)}
.top{height:60px;background:var(--panel);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:16px;padding:0 24px;flex:0 0 auto}
.top h1{font-size:18px;font-weight:700;letter-spacing:-.02em;margin:0}
.top .sub{font-size:12px;color:var(--t3)}
.search{margin-left:18px;flex:1;max-width:380px;display:flex;align-items:center;gap:8px;background:var(--bg);border:1px solid var(--line2);border-radius:9px;padding:8px 12px;color:var(--t3);font-size:13px}
.chip{font-family:var(--mono);font-size:11px;border:1px solid var(--line2);border-radius:8px;padding:6px 11px;color:var(--t2);display:flex;align-items:center;gap:7px;cursor:pointer;background:var(--panel)}
.chip .d{width:7px;height:7px;border-radius:50%;background:var(--green)}
.chip.teams{color:var(--ind);border-color:#d9dbf3;background:#f1f1fb}
.av{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--brand),var(--ind));color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700}
.view{flex:1;overflow-y:auto;padding:24px}
.fade{animation:f .3s ease}@keyframes f{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* generic */
.grid{display:grid;gap:16px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:14px;box-shadow:var(--sh)}
.card .h{display:flex;align-items:center;gap:10px;padding:16px 18px;border-bottom:1px solid var(--line)}
.card .h h3{font-size:14px;font-weight:700;margin:0}
.card .h .more{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--brand);cursor:pointer}
.card .b{padding:16px 18px}
.sect{font-size:12px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.08em;color:var(--t3);margin:4px 0 12px}

/* KPI */
.kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:18px}
@media(max-width:1100px){.kpis{grid-template-columns:repeat(3,1fr)}}
@media(max-width:680px){.kpis{grid-template-columns:repeat(2,1fr)}}
.kpi{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px 18px;box-shadow:var(--sh)}
.kpi .l{font-size:12px;color:var(--t3)}
.kpi .v{font-size:28px;font-weight:800;letter-spacing:-.03em;margin-top:6px;font-variant-numeric:tabular-nums}
.kpi .dlt{font-family:var(--mono);font-size:11px;margin-top:4px}
.kpi .dlt.up{color:var(--green)}.kpi .dlt.dn{color:var(--red)}

.cols{display:grid;grid-template-columns:1.5fr 1fr;gap:16px}
@media(max-width:960px){.cols{grid-template-columns:1fr}}

/* attention feed */
.att{display:flex;align-items:flex-start;gap:12px;padding:13px 0;border-bottom:1px solid var(--line)}
.att:last-child{border-bottom:0}
.att .ic{width:30px;height:30px;border-radius:9px;flex:0 0 auto;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700}
.att .ic.r{background:var(--red-bg);color:var(--red)}.att .ic.a{background:var(--amber-bg);color:var(--amber)}.att .ic.m{background:var(--brand-soft);color:var(--brand)}.att .ic.b{background:#e8eefe;color:var(--blue)}
.att .x{flex:1;min-width:0}
.att .t{font-size:13.5px;font-weight:600}
.att .s{font-size:12px;color:var(--t3);margin-top:2px}
.att .go{font-family:var(--mono);font-size:11px;color:var(--brand);border:1px solid var(--brand-soft);background:var(--brand-soft);border-radius:7px;padding:6px 11px;cursor:pointer;flex:0 0 auto}
.att .go:hover{background:var(--brand);color:#fff}

/* activity feed */
.feed .it{display:flex;gap:11px;padding:11px 0;border-bottom:1px solid var(--line);font-size:13px}
.feed .it:last-child{border-bottom:0}
.feed .dot{width:8px;height:8px;border-radius:50%;margin-top:5px;flex:0 0 auto;background:var(--ind)}
.feed .tm{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--t4);white-space:nowrap}
.feed b{font-weight:600}

/* chart */
.chart{display:flex;align-items:flex-end;gap:10px;height:120px;padding-top:8px}
.chart .bar{flex:1;background:linear-gradient(180deg,var(--brand),#ff5fb0);border-radius:6px 6px 0 0;position:relative;min-height:6px}
.chart .bar span{position:absolute;bottom:-20px;left:0;right:0;text-align:center;font-family:var(--mono);font-size:10px;color:var(--t3)}
.chart .bar b{position:absolute;top:-18px;left:0;right:0;text-align:center;font-family:var(--mono);font-size:10px;color:var(--t2)}

/* table */
.tbl{width:100%;border-collapse:collapse}
.tbl th{text-align:left;font-family:var(--mono);font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--t3);font-weight:500;padding:0 14px 10px}
.tbl td{padding:13px 14px;border-top:1px solid var(--line);font-size:13.5px;vertical-align:middle}
.tbl tr.row{cursor:pointer}
.tbl tr.row:hover td{background:#fafbff}
.who{display:flex;align-items:center;gap:11px}
.who .ava{width:34px;height:34px;border-radius:9px;background:#eef0f7;color:var(--t2);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;flex:0 0 auto}
.who .nm{font-weight:600}.who .mt{font-size:11.5px;color:var(--t3);font-family:var(--mono)}
.score{display:inline-flex;align-items:center;gap:9px}
.ring{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex:0 0 auto}
.ring i{width:26px;height:26px;border-radius:50%;background:var(--panel);display:flex;align-items:center;justify-content:center}
.pill{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:600;padding:4px 10px;border-radius:999px}
.pill .d{width:6px;height:6px;border-radius:50%}
.pill.new{background:#eef0f7;color:var(--t2)}.pill.new .d{background:var(--t3)}
.pill.screen{background:#e8eefe;color:var(--blue)}.pill.screen .d{background:var(--blue)}
.pill.sub{background:var(--brand-soft);color:var(--brand)}.pill.sub .d{background:var(--brand)}
.pill.intv{background:#efeafe;color:var(--ind)}.pill.intv .d{background:var(--ind)}
.pill.placed{background:var(--green-bg);color:var(--green)}.pill.placed .d{background:var(--green)}
.pill.open{background:var(--green-bg);color:var(--green)}.pill.open .d{background:var(--green)}
.pill.hold{background:var(--amber-bg);color:var(--amber)}.pill.hold .d{background:var(--amber)}
.pill.stale{background:var(--red-bg);color:var(--red)}.pill.stale .d{background:var(--red)}
.tag{font-family:var(--mono);font-size:11px;color:var(--t2);background:var(--bg);border:1px solid var(--line);border-radius:6px;padding:2px 7px;margin-right:4px;white-space:nowrap}
.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.fpill{font-size:12px;padding:7px 13px;border-radius:8px;border:1px solid var(--line2);background:var(--panel);color:var(--t2);cursor:pointer}
.fpill.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.btn{font-size:13px;font-weight:600;border-radius:9px;padding:9px 15px;cursor:pointer;border:1px solid var(--line2);background:var(--panel);color:var(--ink);font-family:var(--sans)}
.btn.pri{background:var(--brand);color:#fff;border-color:var(--brand)}
.btn.pri:hover{background:var(--brand-dk)}
.btn.sm{padding:6px 11px;font-size:12px}

/* drawer */
.scrim{position:fixed;inset:0;background:rgba(16,19,32,.45);opacity:0;pointer-events:none;transition:.25s;z-index:30}
.scrim.on{opacity:1;pointer-events:auto}
.drawer{position:fixed;top:0;right:0;bottom:0;width:min(520px,94vw);background:var(--panel);box-shadow:-20px 0 60px rgba(16,19,32,.25);transform:translateX(100%);transition:transform .3s cubic-bezier(.2,.7,.2,1);z-index:31;display:flex;flex-direction:column}
.drawer.on{transform:none}
.drawer .dh{padding:20px 22px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:14px}
.drawer .dh .x{margin-left:auto;width:32px;height:32px;border-radius:8px;border:1px solid var(--line2);background:var(--panel);cursor:pointer;color:var(--t2);font-size:15px}
.drawer .db{flex:1;overflow-y:auto;padding:22px}
.drawer .da{padding:16px 22px;border-top:1px solid var(--line);display:flex;gap:10px;flex-wrap:wrap}
.comp{margin:10px 0}
.comp .cl{display:flex;justify-content:space-between;font-size:12px;color:var(--t2);margin-bottom:4px}.comp .cl b{color:var(--ink)}
.bar2{height:7px;background:#eef0f7;border-radius:5px;overflow:hidden}.bar2 i{display:block;height:100%;background:linear-gradient(90deg,var(--brand),#ff5fb0);border-radius:5px}
.doc{background:var(--bg);border:1px solid var(--line);border-radius:11px;padding:14px 16px;margin-top:12px}
.doc h4{margin:0 0 8px;font-size:10.5px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.07em;color:var(--brand)}
.doc .r{display:flex;justify-content:space-between;font-size:12.5px;padding:3px 0;border-bottom:1px solid #eef0f5}.doc .r:last-child{border-bottom:0}.doc .r span{color:var(--t3)}
.doc ul{margin:0;padding-left:16px}.doc li{font-size:12.5px;margin:5px 0;line-height:1.4}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:11px 18px;border-radius:10px;font-size:13px;box-shadow:0 12px 40px rgba(0,0,0,.3);opacity:0;transition:.3s;z-index:40;display:flex;align-items:center;gap:9px}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
.toast .k{color:#7fe3b6}
.exit{font-family:var(--mono);font-size:11px}
/* clients */
.clientcard{background:var(--panel);border:1px solid var(--line);border-radius:14px;box-shadow:var(--sh);padding:18px;margin-bottom:14px}
.leadbar{display:flex;align-items:center;gap:10px;margin-top:8px;font-family:var(--mono);font-size:12px;color:var(--t2)}
.leadbar b{color:var(--brand);font-size:15px}
/* ---- feature spotlight (zoom callouts) ---- */
.spot-scrim{position:fixed;inset:0;background:rgba(8,10,20,.7);backdrop-filter:blur(2px);opacity:0;pointer-events:none;transition:.4s;z-index:50}
.spot-scrim.on{opacity:1;pointer-events:auto}
.spot-clone{position:fixed;z-index:52;background:var(--panel);border-radius:14px;padding:6px;box-shadow:0 36px 90px rgba(0,0,0,.55),0 0 0 2px var(--brand),0 0 0 9px rgba(236,11,140,.22);transform-origin:center;transition:transform .6s cubic-bezier(.2,.85,.2,1),opacity .4s;opacity:0}
.spot-clone.on{opacity:1}
.spot-callout{position:fixed;z-index:53;width:312px;background:#14151f;color:#fff;border:1px solid #2a2e3e;border-radius:16px;padding:20px;box-shadow:0 28px 80px rgba(0,0,0,.55);opacity:0;transform:translateY(12px) scale(.97);transition:.45s cubic-bezier(.2,.85,.2,1);z-index:53}
.spot-callout.on{opacity:1;transform:none}
.spot-callout .k{font-family:var(--mono);font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--brand)}
.spot-callout h4{margin:9px 0 7px;font-size:19px;font-weight:800;letter-spacing:-.02em;color:#fff;line-height:1.1}
.spot-callout p{margin:0;font-size:13.5px;color:#bfc4d4;line-height:1.55}
.spot-callout .rw{display:flex;align-items:center;gap:12px;margin-top:18px}
.spot-callout .dts{display:flex;gap:6px;flex:1}.spot-callout .dts i{width:6px;height:6px;border-radius:50%;background:#3a3f52}.spot-callout .dts i.on{background:var(--brand);transform:scale(1.3)}
.spot-callout .nx{background:var(--brand);color:#fff;border:0;border-radius:9px;padding:9px 18px;font-weight:700;font-size:13px;cursor:pointer;font-family:var(--sans)}
.spot-callout .nx:hover{background:var(--brand-dk)}
.spot-skip{position:fixed;top:16px;right:18px;z-index:54;color:#fff;background:rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.25);border-radius:8px;padding:7px 13px;font-size:12px;font-family:var(--mono);cursor:pointer;opacity:0;pointer-events:none;transition:.3s}
.spot-skip.on{opacity:1;pointer-events:auto}
.spot-intro{position:fixed;inset:0;z-index:56;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at 50% 38%,rgba(236,11,140,.20),rgba(8,10,20,.94) 58%);opacity:0;pointer-events:none;transition:.55s}
.spot-intro.on{opacity:1;pointer-events:auto}
.spot-intro .c{text-align:center;max-width:560px;padding:0 24px;transform:translateY(14px);transition:.6s;opacity:0}
.spot-intro.on .c{transform:none;opacity:1}
.spot-intro .wm{font-weight:800;font-size:22px;letter-spacing:-.04em;color:#fff;margin-bottom:20px}.spot-intro .wm .g{color:var(--brand)}
.spot-intro .k{font-family:var(--mono);font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--brand);margin-bottom:12px}
.spot-intro h2{font-size:clamp(32px,5.4vw,50px);font-weight:800;letter-spacing:-.035em;color:#fff;margin:0 0 16px;line-height:1.04}
.spot-intro p{color:#c5c9d6;font-size:16px;line-height:1.55;margin:0 auto 28px;max-width:44ch}
.spot-intro .go{background:var(--brand);color:#fff;border:0;border-radius:12px;padding:14px 28px;font-size:15px;font-weight:700;cursor:pointer;font-family:var(--sans)}
.spot-intro .go:hover{background:var(--brand-dk)}
/* channels (Teams & Slack) */
.chat{max-width:720px}
.chead{font-weight:700;font-size:14px;padding:0 0 14px;border-bottom:1px solid var(--line);margin-bottom:18px;color:var(--ink)}
.chead span{color:var(--t3);font-weight:400;font-family:var(--mono);font-size:12px}
.cmsg{display:flex;gap:11px;margin-bottom:16px}
.cmsg .a{width:36px;height:36px;border-radius:8px;flex:0 0 auto;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;font-size:12px}
.cmsg.bot .a{background:linear-gradient(135deg,var(--brand),var(--ind))}
.cmsg.me .a{background:#7a7a88}
.chat.slack .cmsg.bot .a{background:#4a154b}
.cmsg .nm{font-weight:700;font-size:13.5px;color:var(--ink)}
.cmsg .nm .tg{font-family:var(--mono);font-size:10px;color:var(--brand);margin-left:7px;font-weight:500}
.cmsg .nm .tm{font-family:var(--mono);font-size:10.5px;color:var(--t4);margin-left:7px;font-weight:400}
.cmsg .tx{font-size:13.5px;color:var(--ink);margin-top:3px;line-height:1.5}
.acard{margin-top:8px;border:1px solid var(--line);border-radius:12px;padding:13px 15px;background:var(--panel);box-shadow:var(--sh);max-width:470px;border-left:3px solid var(--ind)}
.chat.slack .acard{border-left:4px solid #36c5f0}
.acard .rev{display:inline-block;font-family:var(--mono);font-size:11px;color:var(--brand);background:var(--brand-soft);border-radius:6px;padding:3px 9px;margin-top:9px}
.acard .btns{display:flex;gap:8px;margin-top:11px;flex-wrap:wrap}
.acard .b{font-size:12px;font-weight:600;border-radius:7px;padding:7px 13px;cursor:pointer;border:1px solid var(--line2);background:var(--panel);color:var(--ink);font-family:var(--sans)}
.acard .b.p{background:var(--ind);color:#fff;border-color:var(--ind)}
.chat.slack .acard .b.p{background:#007a5a;border-color:#007a5a}
/* revenue funnel */
.fn{margin:11px 0}
.fl{display:flex;justify-content:space-between;font-size:13px;color:var(--t2);margin-bottom:5px}.fl b{color:var(--ink)}
.fbwrap{background:#eef0f7;border-radius:6px;overflow:hidden}
.fb{height:12px;border-radius:6px;background:linear-gradient(90deg,var(--brand),var(--ind))}
/* ===== open-design elevation pass (Stripe depth · Linear type discipline) ===== */
body{background:#f3f4f8}
.view{background:radial-gradient(130% 90% at 50% -12%,#fbfbfe,#f3f4f8 58%)}
.card,.kpi,.clientcard,.sub-modal{border-color:#edeef4;border-radius:16px;box-shadow:0 1px 2px rgba(17,24,39,.04),0 14px 30px -14px rgba(17,24,39,.14)}
.kpi{transition:transform .18s ease,box-shadow .18s ease}
.kpi:hover{transform:translateY(-2px);box-shadow:0 2px 4px rgba(17,24,39,.05),0 22px 44px -18px rgba(17,24,39,.22)}
.kpi .v{font-size:30px;letter-spacing:-.035em}
.kpi .l{font-weight:500;color:var(--t2)}
.card .h h3{letter-spacing:-.012em;font-size:14.5px}
.top h1{letter-spacing:-.03em;font-weight:800}
.tbl td{border-color:#eef0f5}
.tbl tr.row{transition:background .12s}
.pill{box-shadow:inset 0 0 0 1px rgba(0,0,0,.015)}
.btn.pri{box-shadow:0 1px 2px rgba(236,11,140,.35),0 10px 22px -10px rgba(236,11,140,.55)}
.side{background:linear-gradient(180deg,#15161f 0%,#0c0d14 100%)}
.nav.on{background:linear-gradient(90deg,rgba(236,11,140,.18),rgba(236,11,140,.03))}
.att{transition:background .12s}.att:hover{background:#fafbff;border-radius:10px}
/* submittal modal */
.modal-c{position:fixed;inset:0;z-index:60;display:none;align-items:center;justify-content:center;padding:24px}
.modal-c.on{display:flex}
.modal-c .bg{position:absolute;inset:0;background:rgba(14,17,28,.52);backdrop-filter:blur(3px)}
.sub-modal{position:relative;background:#fff;width:min(560px,96vw);max-height:88vh;display:flex;flex-direction:column;overflow:hidden;animation:f .3s}
.sub-modal .h{padding:18px 22px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px}
.sub-b{padding:20px 22px;overflow-y:auto}

    {view:'clients',k:'Client portal → leads',t:'Interest becomes revenue',b:'Clients review the shortlist in their own Teams. One tap of Interested creates a tracked sales lead.',sel:function(){return document.querySelector('.clientcard .go');}},
    {view:'channels',k:'Lives where you work',t:'Native in Teams and Slack',b:'Every agent posts and acts inside your channels with adaptive cards — recruiters never open another tab. Same agents, both surfaces.',sel:function(){return document.querySelector('.acard');}},
    {view:'revenue',k:'A revenue machine',t:'Signals become dollars',b:'Client interest becomes qualified leads, submittals and placements — tracked to pipeline, forecast and gross profit.',sel:function(){return document.querySelector('.kpis');}},
    {view:'record',pre:function(){curCand=1;recTab='communication';},k:'Source, freshness, every message',t:'The full story, on the record',b:'Where the data came from, when it was last verified, and the entire candidate + client conversation — all in one place.',sel:function(){return document.querySelector('.rec-cols');}},
  ];
  var scrim,callout,skip,intro,clone,i=0;
  function mk(tag,cls,html){var e=document.createElement(tag);if(cls)e.className=cls;if(html!=null)e.innerHTML=html;document.body.appendChild(e);return e;}
  function build(){
    scrim=mk('div','spot-scrim');
    skip=mk('button','spot-skip','✕ Skip tour');skip.onclick=end;
    callout=mk('div','spot-callout');
    intro=mk('div','spot-intro','<div class="c"><div class="wm"><span class="g">g</span>.AI</div><div class="k">Introducing</div><h2>Staffing OS</h2><p>The AI staffing platform that lives inside Microsoft Teams. Here are the moments that matter — in 30 seconds.</p><button class="go" id="spotGo">See what’s new →</button></div>');
    intro.querySelector('#spotGo').onclick=function(){intro.classList.remove('on');setTimeout(function(){intro.style.display='none';run(0);},460);};
  }
  function clearClone(){if(clone){clone.remove();clone=null;}}
  function run(n){
    i=n;var s=TOUR[i];if(s.pre)s.pre();go(s.view);
    setTimeout(function(){
      var target=s.sel();if(!target){next();return;}
      var r=target.getBoundingClientRect();clearClone();
      clone=document.createElement('div');clone.className='spot-clone';
      clone.style.left=r.left+'px';clone.style.top=r.top+'px';clone.style.width=r.width+'px';clone.style.minHeight=r.height+'px';
      var inner=target.cloneNode(true);inner.style.margin='0';inner.style.width='100%';clone.appendChild(inner);document.body.appendChild(clone);
      scrim.classList.add('on');skip.classList.add('on');
      var big=r.width>460?1.12:1.34, cx=r.left+r.width/2, cy=r.top+r.height/2;
      var dx=(innerWidth/2-cx)*0.32, dy=(innerHeight/2-cy)*0.32;
      requestAnimationFrame(function(){clone.classList.add('on');clone.style.transform='translate('+dx+'px,'+dy+'px) scale('+big+')';});
      var cw=312, left=cx<innerWidth/2?innerWidth-cw-30:30, top=Math.max(80,Math.min(innerHeight-230,cy-90));
      callout.style.left=left+'px';callout.style.top=top+'px';
      callout.innerHTML='<div class="k">'+s.k+'</div><h4>'+s.t+'</h4><p>'+s.b+'</p><div class="rw"><div class="dts">'+TOUR.map(function(_,m){return '<i class="'+(m===i?'on':'')+'"></i>';}).join('')+'</div><button class="nx">'+(i===TOUR.length-1?'Done':'Next →')+'</button></div>';
      callout.querySelector('.nx').onclick=next;
      requestAnimationFrame(function(){callout.classList.add('on');});
    }, s.pre?440:280);
  }
  function next(){callout.classList.remove('on');if(clone){clone.style.transform='';clone.classList.remove('on');}setTimeout(function(){clearClone();if(i<TOUR.length-1)run(i+1);else end();},380);}
  function end(){callout.classList.remove('on');skip.classList.remove('on');scrim.classList.remove('on');clearClone();closeDrawer();}
  function start(){if(!scrim)build();intro.style.display='';requestAnimationFrame(function(){intro.classList.add('on');});}
  return {start:start};
})();
document.getElementById('tourBtn').onclick=function(e){e.preventDefault();SPOT.start();};

go('dashboard');
</script>
</body>
